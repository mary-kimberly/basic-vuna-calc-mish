name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: docker.io

jobs:

  # ── JOB 1: LINT & BUILD VERIFICATION ──
  lint-and-build:
    name: Lint & Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify application script compiles
        run: node -e "require('./src/app.js'); console.log('App compile successful');"

  # ── JOB 2: DOCKER BUILD & PUSH ──
  docker-build:
    name: Docker Build & Registry Push
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/unitconvertervuna:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/unitconvertervuna:sha-${{ github.sha }}

  # ── JOB 3: SECURITY AUDIT ──
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── JOB 4: DEPLOY VIA FTPS ──
  deploy:
    name: Deploy to VPS via FTPS
    runs-on: ubuntu-latest
    needs: [docker-build, security-audit]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy files to michelle.vudse26.cloud via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/Dockerfile
            **/.github/**

  # ── JOB 5: VERIFY LIVE DEPLOYMENT ──
  verify-deployment:
    name: Verify Live Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Wait for server to settle
        run: sleep 15

      - name: Curl live URL and check for HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://michelle.vudse26.cloud)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deployment verification FAILED — expected 200, got $STATUS"
            exit 1
          fi
          echo "Deployment verified successfully!"