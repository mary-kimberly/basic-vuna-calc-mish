name: CI/CD Pipeline

on:
  push:
    branches: [ main ]  # Runs automatically every time you push to the main branch
  workflow_dispatch:     # Allows you to click a button and run it manually

env:
  NODE_VERSION: '20'
  IMAGE_NAME: ${{ github.repository_owner }}/nodeapp-cicd
  REGISTRY: docker.io

jobs:
  # ── JOB 1: VALIDATE THE CODE STYLE ──
  lint-and-build:
    name: Lint & Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify application script compiles
        run: node -e "require('./src/app.js'); console.log('App test compile successful');"

  # ── JOB 2: DOCKER AUTOMATED BUILD ──
  docker-build:
    name: Docker Build & Registry Push
    runs-on: ubuntu-latest
    needs: [lint-and-build] # Only runs if the lint/compile verification passes first
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}