# ── JOB 2: DOCKER AUTOMATED BUILD ──
  docker-build:
    name: Docker Build & Registry Push
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 🔤 STEP TO CONVERT USERNAME TO LOWERCASE
      - name: Convert repository owner to lowercase
        id: string
        run: |
          echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.string.outputs.owner }}/nodeapp-cicd:latest
            ${{ env.REGISTRY }}/${{ steps.string.outputs.owner }}/nodeapp-cicd:sha-${{ github.sha }}